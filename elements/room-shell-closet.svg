<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 440" shape-rendering="crispEdges">
  <title>Closet diorama (narrow, dim)</title>
  <desc>Tall narrow closet slice, no window, subdued lighting.</desc>

  <defs>
    <pattern id="woodFloorCloset" width="48" height="10" patternUnits="userSpaceOnUse">
      <rect width="48" height="10" fill="#5a3d28"/>
      <rect x="0" y="0" width="16" height="10" fill="#6a4a32"/>
      <rect x="16" y="0" width="18" height="10" fill="#4e3523"/>
      <rect x="34" y="0" width="14" height="10" fill="#5c402a"/>
      <path d="M0 10H48" stroke="#3d2818" stroke-width="1"/>
      <path d="M12 0V10M28 0V10M40 0V10" stroke="#4a3220" stroke-width="1" opacity="0.5"/>
    </pattern>
    <linearGradient id="closetFalloff" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0806" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#0a0806" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0806" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="240" height="440" fill="#4a4540"/>
  <rect x="0" y="0" width="240" height="268" fill="#5c564f"/>
  <rect x="0" y="175" width="240" height="93" fill="#524c46"/>
  <rect x="0" y="268" width="240" height="172" fill="url(#woodFloorCloset)"/>
  <rect x="0" y="262" width="240" height="6" fill="#3d2a1c"/>
  <rect x="0" y="0" width="240" height="440" fill="none" stroke="#2e2a26" stroke-width="4"/>

  <rect x="20" y="118" width="200" height="3" fill="#6b6258" opacity="0.45"/>

  <rect x="0" y="0" width="240" height="440" fill="url(#closetFalloff)" pointer-events="none"/>
  <rect x="0" y="0" width="240" height="440" fill="#080605" opacity="0.22" pointer-events="none"/>

  <g id="furniture" pointer-events="none" style="image-rendering:pixelated"></g>
</svg>

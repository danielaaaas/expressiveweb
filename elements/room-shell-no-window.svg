<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 416 398" shape-rendering="crispEdges">
  <title>Notebook diorama (interior without window)</title>
  <desc>Plain walls and pixel plank floor, no window. Hallways and small closets.</desc>

  <defs>
    <pattern id="woodFloorNoWin" width="56" height="10" patternUnits="userSpaceOnUse">
      <rect width="56" height="10" fill="#8f5f3c"/>
      <rect x="0" y="0" width="18" height="10" fill="#9d6b45"/>
      <rect x="18" y="0" width="22" height="10" fill="#835335"/>
      <rect x="40" y="0" width="16" height="10" fill="#966246"/>
      <path d="M0 10H56" stroke="#5c3a24" stroke-width="1"/>
      <path d="M14 0V10M32 0V10M48 0V10" stroke="#6d4428" stroke-width="1" opacity="0.55"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="416" height="398" fill="#e8e4dc"/>
  <rect x="0" y="0" width="416" height="248" fill="#ddd8cf"/>
  <rect x="0" y="168" width="416" height="80" fill="#d4cec3"/>
  <rect x="0" y="248" width="416" height="150" fill="url(#woodFloorNoWin)"/>
  <rect x="0" y="242" width="416" height="6" fill="#6b4a32"/>
  <rect x="0" y="0" width="416" height="398" fill="none" stroke="#6a5c52" stroke-width="4"/>

  <g id="furniture" pointer-events="none" style="image-rendering:pixelated"/>
</svg>

  <!-- shell -->
  <polygon points="56,66 156,24 258,66 158,108" fill="#f1cf85"/>
  <polygon points="56,66 158,108 158,184 56,144" fill="#e7b868"/>
  <polygon points="258,66 158,108 158,184 258,144" fill="#dfaa5e"/>

  <!-- inner wall planes (bottom edge snapped to floor ridge) -->
  <polygon points="66,72 158,109 158,176 66,140" fill="#f4ead3"/>
  <polygon points="250,72 158,109 158,176 250,140" fill="#f4ead3"/>

  <!-- floor plane -->

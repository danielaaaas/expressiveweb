  <polygon points="218,129 228,132 228,149 218,145" fill="#74bec4"/>
  <polygon points="228,132 244,126 244,143 228,149" fill="#8ad3d6"/>

  <!-- vanity block -->
  <polygon points="98,118 123,110 136,114 111,123" fill="#64a9b1"/>
  <polygon points="98,118 111,123 111,145 98,140" fill="#417983"/>
  <polygon points="111,123 136,114 136,136 111,145" fill="#538f98"/>

  <!-- mirror blocks -->
  <polygon points="93,80 111,73 111,106 93,113" fill="#cbfbff"/>
  <polygon points="116,71 134,64 134,97 116,104" fill="#cbfbff"/>
